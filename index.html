<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 라이브러리</title>
<style>
  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --border: #2a2a30;
    --border2: #38383f;
    --text: #e8e8ec;
    --text2: #9898a8;
    --text3: #606070;
    --accent: #7c6af7;
    --accent2: #a594f9;
    --tag-prog: #1e2a4a;
    --tag-prog-t: #7aadff;
    --tag-art: #2a1e38;
    --tag-art-t: #c47aff;
    --tag-plan: #1e2e1e;
    --tag-plan-t: #7acf7a;
    --tag-common: #2a2a1e;
    --tag-common-t: #cfcf7a;
    --tag-important: #2e1e1e;
    --tag-important-t: #cf7a7a;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(15,15,17,0.9);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .logo span { color: var(--accent2); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .admin-link { font-size: 12px; color: var(--text3); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--radius-sm); transition: all .15s; }
  .admin-link:hover { color: var(--text2); border-color: var(--border2); }

  .layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 56px); }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 20px; margin-bottom: 4px; }
  .sidebar-btn {
    width: 100%;
    padding: 8px 20px;
    text-align: left;
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .1s;
    border-left: 2px solid transparent;
  }
  .sidebar-btn:hover { color: var(--text); background: var(--bg2); }
  .sidebar-btn.active { color: var(--text); background: var(--bg3); border-left-color: var(--accent); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 12px 20px; }

  .main { padding: 32px 40px; max-width: 860px; }

  .page { display: none; }
  .page.active { display: block; }

  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 6px; }

  .search-bar {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color .15s;
  }
  .search-bar:focus { border-color: var(--border2); }
  .search-bar::placeholder { color: var(--text3); }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-head {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
  }
  .card-head-left { flex: 1; min-width: 0; }
  .card-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .card-title-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .card-meta { font-size: 12px; color: var(--text3); }
  .card-chevron { color: var(--text3); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
  .card-chevron.open { transform: rotate(180deg); }
  .card-body {
    display: none;
    padding: 0 18px 16px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.75;
    white-space: pre-wrap;
    border-top: 1px solid var(--border);
  }
  .card-body.open { display: block; padding-top: 14px; }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.03em;
  }
  .tag-프로그래머 { background: var(--tag-prog); color: var(--tag-prog-t); }
  .tag-아트 { background: var(--tag-art); color: var(--tag-art-t); }
  .tag-기획 { background: var(--tag-plan); color: var(--tag-plan-t); }
  .tag-공통 { background: var(--tag-common); color: var(--tag-common-t); }
  .tag-중요 { background: var(--tag-important); color: var(--tag-important-t); }
  .tag-공지 { background: var(--tag-important); color: var(--tag-important-t); }

  .empty { text-align: center; padding: 48px 0; color: var(--text3); font-size: 13px; }

  /* 게시판 */
  .post-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 8px;
    transition: border-color .15s;
    cursor: pointer;
  }
  .post-card:hover { border-color: var(--border2); }
  .post-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .post-author { display: flex; align-items: center; gap: 8px; }
  .author-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .author-name { font-size: 12px; color: var(--text2); font-weight: 500; }
  .post-date { font-size: 11px; color: var(--text3); }
  .post-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .post-preview { font-size: 12px; color: var(--text3); line-height: 1.6; white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* 모달 */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-meta { font-size: 12px; color: var(--text3); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .modal-body { font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
  .modal-close { margin-top: 20px; width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; }
  .modal-close:hover { background: var(--bg3); }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">팀 <span>라이브러리</span></div>
  <div class="header-right">
    <a class="admin-link" href="admin.html">관리자 ↗</a>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">문서</div>
      <button class="sidebar-btn active" onclick="showPage('engine')">⚙️ 엔진 기능</button>
      <button class="sidebar-btn" onclick="showPage('prefab')">📦 프리팹 세팅</button>
      <button class="sidebar-btn" onclick="showPage('tools')">🛠️ 협업 툴</button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">소통</div>
      <button class="sidebar-btn" onclick="showPage('board')">💬 팀원 공간</button>
    </div>
  </aside>

  <main class="main">
    <div id="page-engine" class="page active"></div>
    <div id="page-prefab" class="page"></div>
    <div id="page-tools" class="page"></div>
    <div id="page-board" class="page"></div>
  </main>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<script>
let data = null;

async function loadData() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    data = await res.json();
    renderAll();
  } catch(e) {
    document.querySelector('.main').innerHTML = '<div class="empty">data.json을 불러올 수 없습니다.<br>같은 폴더에 data.json이 있는지 확인해 주세요.</div>';
  }
}

function renderAll() {
  renderSection('engine');
  renderSection('prefab');
  renderSection('tools');
  renderBoard();
}

const SECTION_DESC = {
  engine: '프로그래머가 만든 편의 기능 사용법을 정리해요. 함수 사용법, 주의사항, 예시 코드를 확인할 수 있어요.',
  prefab: '씬에서 사용하는 프리팹의 세팅 방법과 컴포넌트 설정을 정리해요.',
  tools: '구글 드라이브, 노션, 깃허브 등 팀 협업 툴 사용 규칙과 방법을 정리해요.'
};

function renderSection(key) {
  const sec = data.sections[key];
  const el = document.getElementById('page-' + key);
  const items = sec.items || [];
  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">${sec.icon} ${sec.label}</div>
      <div class="page-desc">${SECTION_DESC[key]}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:6px">${items.length}개 항목</div>
    </div>
    <input class="search-bar" placeholder="검색..." oninput="filterCards('${key}', this.value)" />
    <div id="list-${key}">
      ${items.length === 0 ? '<div class="empty">아직 항목이 없어요.</div>' : items.map((item, i) => renderCard(key, item, i)).join('')}
    </div>`;
}

function renderCard(key, item, i) {
  const tags = Array.isArray(item.tags) ? item.tags : (item.tag ? [item.tag] : []);
  const tagHTML = tags.map(t => `<span class="hashtag">#${t}</span>`).join('');
  return `<div class="card" id="card-${key}-${i}">
    <div class="card-head" onclick="toggleCard('${key}',${i})">
      <div class="card-head-left">
        <div class="card-title-row">
          <span class="card-title-text">${item.title}</span>
          ${tagHTML}
        </div>
        <div class="card-meta">${item.author} · ${item.date}</div>
      </div>
      <span class="card-chevron" id="chev-${key}-${i}">▼</span>
    </div>
    <div class="card-body" id="body-${key}-${i}">${item.body}</div>
  </div>`;
}

function toggleCard(key, i) {
  const body = document.getElementById('body-' + key + '-' + i);
  const chev = document.getElementById('chev-' + key + '-' + i);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterCards(key, query) {
  const sec = data.sections[key];
  const q = query.toLowerCase();
  const el = document.getElementById('list-' + key);
  const filtered = sec.items.filter(item => {
    const tags = Array.isArray(item.tags) ? item.tags : (item.tag ? [item.tag] : []);
    return item.title.toLowerCase().includes(q) ||
      item.body.toLowerCase().includes(q) ||
      item.author.toLowerCase().includes(q) ||
      tags.some(t => t.toLowerCase().includes(q.replace(/^#/, '')));
  });
  el.innerHTML = filtered.length === 0
    ? '<div class="empty">검색 결과가 없어요.</div>'
    : filtered.map((item, i) => renderCard(key, item, i)).join('');
}

function renderBoard() {
  const el = document.getElementById('page-board');
  const posts = (data.board && data.board.posts) || [];
  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">💬 팀원 공간</div>
      <div class="page-desc">${posts.length}개 게시물</div>
    </div>
    ${posts.length === 0 ? '<div class="empty">아직 게시물이 없어요.</div>'
      : posts.slice().reverse().map((post, i) => `
      <div class="post-card" onclick="openPost(${posts.length - 1 - i})">
        <div class="post-card-head">
          <div class="post-author">
            <div class="author-dot" style="background:${post.authorColor || '#7c6af7'}"></div>
            <span class="author-name">${post.author}</span>
            ${post.tag ? `<span class="tag tag-${post.tag}">${post.tag}</span>` : ''}
          </div>
          <span class="post-date">${post.date}</span>
        </div>
        <div class="post-title">${post.title}</div>
        <div class="post-preview">${post.body}</div>
      </div>`).join('')}`;
}

function openPost(i) {
  const post = data.board.posts[i];
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">${post.title}</div>
    <div class="modal-meta">
      <div class="author-dot" style="background:${post.authorColor || '#7c6af7'}; width:8px; height:8px; border-radius:50%;"></div>
      ${post.author} · ${post.date}
      ${post.tag ? `<span class="tag tag-${post.tag}">${post.tag}</span>` : ''}
    </div>
    <div class="modal-body">${post.body}</div>
    <button class="modal-close" onclick="closeModal()">닫기</button>`;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function showPage(key) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + key).classList.add('active');
  event.currentTarget.classList.add('active');
}

loadData();
</script>
</body>
</html>
