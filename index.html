<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 라이브러리</title>
<style>
  :root {
    --bg: #0f0f11; --bg2: #17171a; --bg3: #1e1e22;
    --border: #2a2a30; --border2: #38383f;
    --text: #e8e8ec; --text2: #9898a8; --text3: #606070;
    --accent: #7c6af7; --accent2: #a594f9;
    --pinned: #2a1e10; --pinned-border: #5a3a10; --pinned-text: #f0a040;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(15,15,17,0.92); backdrop-filter: blur(12px); z-index: 10; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .logo span { color: var(--accent2); }
  .admin-link { font-size: 12px; color: var(--text3); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--radius-sm); transition: all .15s; }
  .admin-link:hover { color: var(--text2); border-color: var(--border2); }

  .layout { display: grid; grid-template-columns: 210px 1fr; min-height: calc(100vh - 56px); }

  .sidebar { border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 20px; margin-bottom: 4px; margin-top: 12px; }
  .sidebar-label:first-child { margin-top: 0; }
  .sidebar-btn { width: 100%; padding: 8px 20px; text-align: left; background: transparent; border: none; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; transition: all .1s; border-left: 2px solid transparent; }
  .sidebar-btn:hover { color: var(--text); background: var(--bg2); }
  .sidebar-btn.active { color: var(--text); background: var(--bg3); border-left-color: var(--accent); }
  .sidebar-btn.pinned-btn.active { border-left-color: var(--pinned-text); color: var(--pinned-text); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 20px; }

  .main { padding: 32px 40px; max-width: 860px; }
  .page { display: none; } .page.active { display: block; }

  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 6px; }
  .page-count { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* 필독 배너 */
  .pinned-banner { background: var(--pinned); border: 1px solid var(--pinned-border); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 20px; font-size: 12px; color: var(--pinned-text); display: flex; align-items: center; gap: 8px; }

  .search-bar { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; color: var(--text); font-size: 13px; margin-bottom: 16px; outline: none; transition: border-color .15s; }
  .search-bar:focus { border-color: var(--border2); }
  .search-bar::placeholder { color: var(--text3); }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; transition: border-color .15s; }
  .card:hover { border-color: var(--border2); }
  .card-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 12px; }
  .card-head-left { flex: 1; min-width: 0; }
  .card-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .card-title-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .card-meta { font-size: 12px; color: var(--text3); }
  .card-chevron { color: var(--text3); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
  .card-chevron.open { transform: rotate(180deg); }
  .card-body { display: none; padding: 0 18px 16px; font-size: 13px; color: var(--text2); line-height: 1.75; border-top: 1px solid var(--border); white-space: pre-wrap; }
  .card-body.open { display: block; padding-top: 14px; }
  .card-body img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
  .card-body code { background: var(--bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: monospace; color: var(--accent2); }
  .card-body hr { border: none; border-top: 1px solid var(--border2); margin: 10px 0; }
  .card-body b, .card-body strong { color: var(--text); font-weight: 600; }

  .hashtag { display: inline-flex; align-items: center; background: #1e2040; color: #a594f9; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; border: 1px solid #3a3060; }

  .empty { text-align: center; padding: 48px 0; color: var(--text3); font-size: 13px; }

  /* 게시판 */
  .post-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 8px; transition: border-color .15s; cursor: pointer; }
  .post-card:hover { border-color: var(--border2); }
  .post-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .post-author { display: flex; align-items: center; gap: 8px; }
  .author-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .author-name { font-size: 12px; color: var(--text2); font-weight: 500; }
  .post-date { font-size: 11px; color: var(--text3); }
  .post-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .post-preview { font-size: 12px; color: var(--text3); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .tag-공지 { background: #2e1e1e; color: #cf7a7a; }
  .tag-공통 { background: #2a2a1e; color: #cfcf7a; }
  .tag-중요 { background: #2e1e1e; color: #cf7a7a; }

  /* 모달 */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-meta { font-size: 12px; color: var(--text3); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .modal-body { font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
  .modal-body img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
  .modal-close { margin-top: 20px; width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; }
  .modal-close:hover { background: var(--bg3); }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">팀 <span>라이브러리</span></div>
  <a class="admin-link" href="admin.html">관리자 ↗</a>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-area"></main>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<script>
let data = null;
let currentPage = null;

async function loadData() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    data = await res.json();
    buildUI();
  } catch(e) {
    document.getElementById('main-area').innerHTML = '<div class="empty">data.json을 불러올 수 없습니다.<br>같은 폴더에 data.json이 있는지 확인해 주세요.</div>';
  }
}

function getSectionOrder() {
  const tabs = data.tabs || {};
  const pinnedOrder = tabs.pinned_order || ['pinned', 'setup'];
  const docOrder = tabs.doc_order || ['engine', 'prefab', 'tools'];
  return { pinnedOrder, docOrder };
}

function buildUI() {
  const { pinnedOrder, docOrder } = getSectionOrder();
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main-area');

  let sidebarHTML = '';
  let mainHTML = '';

  // 필독 그룹
  if (pinnedOrder.length > 0) {
    sidebarHTML += `<div class="sidebar-label">필독</div>`;
    pinnedOrder.forEach(key => {
      const sec = data.sections[key];
      if (!sec) return;
      sidebarHTML += `<button class="sidebar-btn pinned-btn" id="nav-${key}" onclick="showPage('${key}')">${sec.icon} ${sec.label}</button>`;
      mainHTML += `<div id="page-${key}" class="page"></div>`;
    });
    sidebarHTML += `<div class="sidebar-divider"></div>`;
  }

  // 문서 그룹
  if (docOrder.length > 0) {
    sidebarHTML += `<div class="sidebar-label">문서</div>`;
    docOrder.forEach(key => {
      const sec = data.sections[key];
      if (!sec) return;
      sidebarHTML += `<button class="sidebar-btn" id="nav-${key}" onclick="showPage('${key}')">${sec.icon} ${sec.label}</button>`;
      mainHTML += `<div id="page-${key}" class="page"></div>`;
    });
    sidebarHTML += `<div class="sidebar-divider"></div>`;
  }

  // 소통 (board 고정)
  sidebarHTML += `<div class="sidebar-label">소통</div>`;
  sidebarHTML += `<button class="sidebar-btn" id="nav-board" onclick="showPage('board')">💬 팀원 공간</button>`;
  mainHTML += `<div id="page-board" class="page"></div>`;

  sidebar.innerHTML = sidebarHTML;
  main.innerHTML = mainHTML;

  // 각 섹션 렌더
  [...pinnedOrder, ...docOrder].forEach(key => {
    if (data.sections[key]) renderSection(key);
  });
  renderBoard();

  // 첫 탭 활성화
  const firstKey = pinnedOrder[0] || docOrder[0] || 'board';
  const firstBtn = document.getElementById('nav-' + firstKey);
  if (firstBtn) { firstBtn.classList.add('active'); }
  const firstPage = document.getElementById('page-' + firstKey);
  if (firstPage) firstPage.classList.add('active');
  currentPage = firstKey;
}

function renderSection(key) {
  const sec = data.sections[key];
  const el = document.getElementById('page-' + key);
  if (!el) return;
  const items = sec.items || [];
  const isPinned = sec.pinned;
  const bannerHTML = isPinned
    ? `<div class="pinned-banner">📌 필독 문서입니다. 팀원 모두 꼭 확인해 주세요.</div>`
    : '';
  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">${sec.icon} ${sec.label}</div>
      <div class="page-desc">${sec.desc || ''}</div>
      <div class="page-count">${items.length}개 항목</div>
    </div>
    ${bannerHTML}
    <input class="search-bar" placeholder="검색..." oninput="filterCards('${key}', this.value)" />
    <div id="list-${key}">
      ${items.length === 0 ? '<div class="empty">아직 항목이 없어요.</div>' : items.map((item, i) => renderCard(key, item, i)).join('')}
    </div>`;
}

function renderCard(key, item, i) {
  const tags = Array.isArray(item.tags) ? item.tags : (item.tag ? [item.tag] : []);
  const tagHTML = tags.map(t => `<span class="hashtag">#${t}</span>`).join('');
  const bodyContent = item.body || '';
  return `<div class="card" id="card-${key}-${i}">
    <div class="card-head" onclick="toggleCard('${key}',${i})">
      <div class="card-head-left">
        <div class="card-title-row">
          <span class="card-title-text">${item.title}</span>
          ${tagHTML}
        </div>
        <div class="card-meta">${item.author} · ${item.date}</div>
      </div>
      <span class="card-chevron" id="chev-${key}-${i}">▼</span>
    </div>
    <div class="card-body" id="body-${key}-${i}">${bodyContent}</div>
  </div>`;
}

function toggleCard(key, i) {
  const body = document.getElementById('body-' + key + '-' + i);
  const chev = document.getElementById('chev-' + key + '-' + i);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterCards(key, query) {
  const sec = data.sections[key];
  const q = query.toLowerCase();
  const el = document.getElementById('list-' + key);
  const filtered = (sec.items || []).filter(item => {
    const tags = Array.isArray(item.tags) ? item.tags : (item.tag ? [item.tag] : []);
    const bodyText = (item.body || '').replace(/<[^>]*>/g, '');
    return item.title.toLowerCase().includes(q) ||
      bodyText.toLowerCase().includes(q) ||
      (item.author || '').toLowerCase().includes(q) ||
      tags.some(t => t.toLowerCase().includes(q.replace(/^#/, '')));
  });
  el.innerHTML = filtered.length === 0
    ? '<div class="empty">검색 결과가 없어요.</div>'
    : filtered.map((item, i) => renderCard(key, item, i)).join('');
}

function renderBoard() {
  const el = document.getElementById('page-board');
  const posts = (data.board && data.board.posts) || [];
  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">💬 팀원 공간</div>
      <div class="page-desc">팀원들의 메모와 공지를 확인할 수 있어요.</div>
      <div class="page-count">${posts.length}개 게시물</div>
    </div>
    ${posts.length === 0 ? '<div class="empty">아직 게시물이 없어요.</div>'
      : posts.slice().reverse().map((post, ri) => `
      <div class="post-card" onclick="openPost(${posts.length - 1 - ri})">
        <div class="post-card-head">
          <div class="post-author">
            <div class="author-dot" style="background:${post.authorColor || '#7c6af7'}"></div>
            <span class="author-name">${post.author}</span>
            ${post.tag ? `<span class="tag tag-${post.tag}">${post.tag}</span>` : ''}
          </div>
          <span class="post-date">${post.date}</span>
        </div>
        <div class="post-title">${post.title}</div>
        <div class="post-preview">${(post.body || '').replace(/<[^>]*>/g, '')}</div>
      </div>`).join('')}`;
}

function openPost(i) {
  const post = data.board.posts[i];
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">${post.title}</div>
    <div class="modal-meta">
      <div class="author-dot" style="background:${post.authorColor || '#7c6af7'}; width:8px; height:8px; border-radius:50%;"></div>
      ${post.author} · ${post.date}
      ${post.tag ? `<span class="tag tag-${post.tag}">${post.tag}</span>` : ''}
    </div>
    <div class="modal-body">${post.body || ''}</div>
    <button class="modal-close" onclick="closeModal()">닫기</button>`;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function showPage(key) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-' + key);
  const btn = document.getElementById('nav-' + key);
  if (page) page.classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = key;
}

loadData();
</script>
</body>
</html>
